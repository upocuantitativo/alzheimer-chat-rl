<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurora · Su asistente</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="static/mock-data.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Lexend', system-ui, sans-serif; background: #fbf4e8; }
  #root { position: fixed; inset: 0; }
  /* Home button — small, top-left, doesn't dominate */
  .home-btn {
    position: fixed; top: 14px; left: 14px; z-index: 50;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: 1.5px solid #e8ddc8;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: #7d6a55;
    transition: all .15s;
    backdrop-filter: blur(4px);
  }
  .home-btn:hover { background: #fff; color: #2a1f15; border-color: #d8c9b1; }

  @keyframes mayorBlink {
    0%, 80%, 100% { opacity: .3; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }
  @keyframes mayorWave {
    0%, 100% { height: 14px; }
    50% { height: 38px; }
  }
</style>
</head>
<body>

<a href="index.html" class="home-btn" title="Volver al inicio">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12L12 3l9 9M5 10v10h14V10"/>
  </svg>
</a>

<div id="root"></div>

<script type="text/babel" src="static/mayor.jsx"></script>
<script type="text/babel">
  const App = window.MayorView;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
